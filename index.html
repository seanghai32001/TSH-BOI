    .profile-photo {

      height: 160px;
      border-radius: 50%;
      object-fit: cover;
      border: 5px solid #9beae3;
      margin-bottom: 25px;
      transition: transform 0.3s;

    .profile-photo:hover {

    }

      justify-content: center;
      gap: 15px;
    }

    .social-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #fff;
      padding: 12px 22px;
      border-radius: 50px;
      font-size: 1rem;
      text-decoration: none;
      transition: all 0.3s ease-in-out;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
    }

    .social-btn i {

    /* Telegram */

    }

    .btn-telegram:hover {

      color: #0088cc;

      color: #1877f2;
      border: 1px solid #1877f2;
      box-shadow: 0 8px 20px rgba(24, 119, 242, 0.2);

    footer {

      padding: 25px;
      background: linear-gradient(to right, #e1d97c, #fff9c4);
